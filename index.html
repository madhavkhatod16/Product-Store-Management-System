<!DOCTYPE html>
<html>
<head>
    <title>Product Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f4f4;
        }
        .box{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-top:30px;
        }
        .card img{
            height:200px;
            width:350px;
			margin-left:0.5%;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="box">
        <h2 class="text-center mb-4">Product Store</h2>
        <input type="text" id="pName" class="form-control mb-3" placeholder="Product Name">
        <input type="number" id="pPrice" class="form-control mb-3" placeholder="Product Price">
        <input type="text" id="pImgUrl" class="form-control mb-3" placeholder="Image URL">
        <button id="addBtn" class="btn btn-primary w-100">
            Add Product
        </button>
        <input type="text" id="search" class="form-control mt-4" placeholder="Search Product">
    </div>
    <div class="row mt-4" id="productCard"></div>
</div>
<script>
let a = [];
document.getElementById("addBtn").addEventListener("click", function(){
		let b = document.getElementById("pName").value;
		let c = document.getElementById("pPrice").value;
		let d = document.getElementById("pImgUrl").value;
		if(b && c && d!=""){
					a.push([b,c,d]);
					document.getElementById("pName").value = "";
					document.getElementById("pPrice").value = "";
					document.getElementById("pImgUrl").value = "";
					displayProducts(a);
		}
    else{
        alert("Please fill all fields");
    }
});
document.getElementById("search").addEventListener("keyup", function(){
    let b = document.getElementById("search").value.toLowerCase();
    let c = [];
    a.forEach(function(i){
        if(i[0].toLowerCase().includes(b)){
            c.push(i);
			console.log(c);
        }
		console.log(c);
    });
    displayProducts(c);
});
function displayProducts(x){
    let y = document.getElementById("productCard");
    let z = "";
    x.forEach(function(i,index){
        z += `<div class="col-md-4 mb-4">
            <div class="card h-100 shadow">
                <img src="${i[2]}" class="card-img-top" alt="${i[0]}">
                <div class="card-body">
                    <h5>${i[0]}</h5>
                    <p class="fw-bold text-success">₹${i[1]}</p>
                    <button class="btn btn-danger w-100"  onclick="deleteProduct(${index})"> Remove </button>
                </div>
            </div>
        </div>
        `;
    });
    y.innerHTML = z;
}
function deleteProduct(index){
    a.splice(index,1);
    displayProducts(a);
}
</script>

</body>
</html>
